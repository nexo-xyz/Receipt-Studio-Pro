<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Test Google Sheets API</title>
</head>
<body style="font-family:sans-serif; padding:20px; background:#111; color:#fff;">

  <h2>🔥 Test Google Apps Script</h2>

  <input id="url" placeholder="ใส่ URL /exec" style="width:100%; padding:10px;"><br><br>

  <button onclick="testPing()">Test Connection</button>
  <button onclick="save()">Save</button>
  <button onclick="load()">Load</button>

  <pre id="log"></pre>

<script>
function log(msg) {
  document.getElementById("log").textContent += msg + "\n";
}

function getUrl() {
  return document.getElementById("url").value.trim();
}

// ======================
// TEST
// ======================
async function testPing() {
  const url = getUrl();

  try {
    const res = await fetch(url + "?action=ping");
    const data = await res.json();
    log("✅ " + JSON.stringify(data, null, 2));
  } catch (err) {
    log("❌ " + err);
  }
}

// ======================
// SAVE
// ======================
async function save() {
  const url = getUrl();

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        action: "saveProfile",
        data: {
          companyName: "COLA XD",
          clientName: "ลูกค้าทดลอง"
        }
      })
    });

    const data = await res.json();
    log("💾 " + JSON.stringify(data, null, 2));

  } catch (err) {
    log("❌ " + err);
  }
}

// ======================
// LOAD
// ======================
async function load() {
  const url = getUrl();

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        action: "loadProfile"
      })
    });

    const data = await res.json();
    log("📥 " + JSON.stringify(data, null, 2));

  } catch (err) {
    log("❌ " + err);
  }
}
</script>

</body>
</html>
